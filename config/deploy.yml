# =============================================================================
# Manifold Self-Hosted Deployment Configuration (Kamal 2)
# =============================================================================
#
# Run bin/deploy configure to generate your instance configuration. This base
# file contains defaults shared by all destinations.
#
# By default this deploys Manifold's pre-built, PUBLIC images from GitHub
# Container Registry (ghcr.io) — no local build. Kamal still logs in to the
# registry even for public images, so you must supply a GitHub username and a
# read:packages personal access token (see the README, "Registry access").
# To build and push your own images instead, see "Deploy from source".
# =============================================================================

# -- Instance Configuration ---------------------------------------------------
# Overridden by each destination file (config/deploy.<dest>.yml).

x-server-ip: &server-ip "203.0.113.1"
x-domain: &domain "manifold.example.com"
x-client-url: &client-url "https://manifold.example.com"

# -- Shared Rails env (API + Worker) ------------------------------------------
# These are shared via YAML merge keys (<<: *rails-env / *rails-secrets).
# The API and Worker sections add their own extras on top.

x-rails-env: &rails-env
  RAILS_ENV: production
  RACK_ENV: production
  RAILS_LOG_TO_STDOUT: "true"
  SSL_ENABLED: "true"
  LANG: en_US.UTF8
  MALLOC_ARENA_MAX: "2"
  DOMAIN: *domain
  RAILS_DB_USER: manifold
  RAILS_DB_NAME: manifold_production
  RAILS_CACHE_DB_USER: manifold
  RAILS_CACHE_DB_NAME: manifold_production_cache
  PGUSER: manifold

x-rails-secrets: &rails-secrets
  - SECRET_KEY_BASE
  - RAILS_SECRET_KEY
  - RAILS_DB_PASS
  - RAILS_CACHE_DB_PASS
  - PGPASSWORD

# -- Service ------------------------------------------------------------------
# The primary service is the Rails API. With the registry server below, the
# image resolves to ghcr.io/manifoldscholar/manifold-api:<version>. Deploys
# pull this published image (bin/deploy up passes --skip-push); the API and
# worker are server roles with zero-downtime rolling deploys.
#
# `service` MUST match the `LABEL service` baked into the published image
# (manifold-api) — on pull, Kamal verifies the image's service label equals
# this value. Do not change it.

service: manifold-api
image: manifoldscholar/manifold-api

servers:
  web:
    hosts:
      - *server-ip
    options:
      network-alias: manifold-api
    cmd: bash -c "bin/ensure-db && bin/rails manifold:upgrade && exec bin/puma -C config/puma.rb"
  worker:
    hosts:
      - *server-ip
    cmd: bundle exec good_job start
    env:
      clear:
        GOOD_JOB_PROBE_PORT: "7001"

proxy:
  host: *domain
  app_port: 3011
  path_prefixes:
    - /api
  strip_path_prefix: false
  healthcheck:
    path: /api/up

# -- Registry -----------------------------------------------------------------
# Default: pull Manifold's published PUBLIC images from GitHub Container
# Registry. Kamal logs in even for public images, so supply your GitHub
# username and a read:packages personal access token (PAT). Both are kept in
# the gitignored secrets file (.kamal/secrets.<dest>) so nothing per-deployer
# lands in this tracked config. See the README, "Registry access".
# For build-from-source, point this at your own registry instead.

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# -- Builder ------------------------------------------------------------------
# Only used when building from source (kamal deploy WITHOUT --skip-push). The
# default pull-based deploy skips the build entirely, so the submodule is not
# needed. Kamal still validates `arch`.

builder:
  arch: amd64  # Your server's architecture: amd64 (x86_64) or arm64 (aarch64)
  context: ./manifold/api
  dockerfile: ./manifold/api/Dockerfile
  target: production

env:
  clear:
    <<: *rails-env
    RAILS_SERVE_STATIC_FILES: "true"
    CLIENT_BROWSER_API_URL: *client-url
    API_PORT: "3011"
    WORKER_COUNT: "2"
    RAILS_MAX_THREADS: "20"
  secret: *rails-secrets

# -- SSH ----------------------------------------------------------------------

ssh:
  user: root

# -- Deploy ------------------------------------------------------------------
# First-time setup runs schema loading, seeds, and upgrades before the API
# starts. Subsequent deploys will be much faster.

deploy_timeout: 120

# -- Aliases ----------------------------------------------------------------

aliases:
  console: app exec -i --reuse "bin/rails console"
  shell: app exec -i --reuse "bash"
  dbconsole: accessory exec db -i --reuse "psql -U manifold manifold_production"
  logs-api: app logs
  logs-client: accessory logs client
  logs-worker: app logs -r worker

# -- Accessories --------------------------------------------------------------
# These services support the primary API application. They share the "kamal"
# Docker network and reach each other by container name (e.g.
# manifold-<dest>-client, manifold-<dest>-db). The client image is also pulled
# from ghcr.io.

accessories:
  client:
    image: ghcr.io/manifoldscholar/manifold-client:latest
    host: *server-ip
    proxy:
      host: *domain
      ssl: true
      app_port: 3010
      forward_headers: true
    env:
      clear:
        NODE_ENV: production
        SSL_ENABLED: "true"
        LANG: en_US.UTF8
        DOMAIN: *domain
        CLIENT_SERVER_PORT: "3010"
        CLIENT_URL: *client-url
        CLIENT_BROWSER_API_URL: *client-url
        CLIENT_BROWSER_API_CABLE_URL: *client-url
        CLIENT_SERVER_API_URL: "http://manifold-api:3011"
        CLIENT_SERVER_PROXIES: "true"