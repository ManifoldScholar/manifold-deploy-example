# =============================================================================
# Manifold Self-Hosted Deployment Configuration (Kamal 2)
# =============================================================================
#
# Run bin/setup to generate your instance configuration. This base file
# contains defaults shared by all destinations.
#
# =============================================================================

# -- Instance Configuration ---------------------------------------------------
# Overridden by each destination file (config/deploy.<dest>.yml).

x-server-ip: &server-ip "203.0.113.1"
x-domain: &domain "manifold.example.com"
x-client-url: &client-url "https://manifold.example.com"

# -- Shared Rails env (API + Worker) ------------------------------------------
# These are shared via YAML merge keys (<<: *rails-env / *rails-secrets).
# The API and Worker sections add their own extras on top.

x-rails-env: &rails-env
  RAILS_ENV: production
  RACK_ENV: production
  RAILS_LOG_TO_STDOUT: "true"
  SSL_ENABLED: "true"
  LANG: en_US.UTF8
  MALLOC_ARENA_MAX: "2"
  DOMAIN: *domain
  RAILS_DB_HOST: manifold-db
  RAILS_DB_USER: manifold
  RAILS_DB_NAME: manifold_production
  RAILS_CACHE_DB_HOST: manifold-db
  RAILS_CACHE_DB_USER: manifold
  RAILS_CACHE_DB_NAME: manifold_cache_production
  PGHOST: manifold-db
  PGUSER: manifold

x-rails-secrets: &rails-secrets
  - SECRET_KEY_BASE
  - RAILS_SECRET_KEY
  - RAILS_DB_PASS
  - RAILS_CACHE_DB_PASS
  - PGPASSWORD

# -- Service ------------------------------------------------------------------
# The primary service is the Rails API. Kamal builds its image, manages
# zero-downtime deploys, and routes `kamal app exec` / `kamal console` here.

service: manifold
image: manifold-api

servers:
  web:
    hosts:
      - *server-ip
    options:
      network-alias: manifold-api
    cmd: bash -c "bin/ensure-db && bin/rails manifold:upgrade && exec bin/puma -C config/puma.rb"
  worker:
    hosts:
      - *server-ip
    cmd: bundle exec good_job start
    env:
      clear:
        GOOD_JOB_PROBE_PORT: "7001"

proxy:
  host: *domain
  app_port: 3011
  path_prefixes:
    - /api
  strip_path_prefix: false
  healthcheck:
    path: /api/up

builder:
  arch: amd64  # Your server's architecture: amd64 (x86_64) or arm64 (aarch64)
  context: ./manifold/api
  dockerfile: ./manifold/api/Dockerfile
  target: production

env:
  clear:
    <<: *rails-env
    RAILS_SERVE_STATIC_FILES: "true"
    CLIENT_BROWSER_API_URL: *client-url
    UPLOAD_CDN_HOST: *client-url
    API_PORT: "3011"
    WORKER_COUNT: "2"
    RAILS_MAX_THREADS: "20"
  secret: *rails-secrets

# -- Registry -----------------------------------------------------------------
# Uses a local Docker registry on the server. No external registry account
# needed. See: https://kamal-deploy.org/docs/configuration/docker-registry/

registry:
  server: localhost:5555

# -- SSH ----------------------------------------------------------------------

ssh:
  user: root

# -- Deploy ------------------------------------------------------------------
# First-time setup runs schema loading, seeds, and upgrades before the API
# starts. Subsequent deploys will be much faster.

deploy_timeout: 120

# -- Aliases ----------------------------------------------------------------

aliases:
  console: app exec -i --reuse "bin/rails console"
  shell: app exec -i --reuse "bash"
  logs-api: app logs
  logs-client: accessory logs client
  logs-worker: app logs -r worker

# -- Accessories --------------------------------------------------------------
# These services support the primary API application. They share the "kamal"
# Docker network and reach each other by container name (e.g. manifold-client,
# manifold-db).

accessories:
  db:
    image: postgres:15-alpine
    host: *server-ip
    env:
      clear:
        POSTGRES_USER: manifold
        POSTGRES_DB: manifold_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
    options:
      shm-size: 2g

  client:
    image: localhost:5555/manifold-client:latest
    host: *server-ip
    proxy:
      host: *domain
      ssl: true
      app_port: 3010
      forward_headers: true
    env:
      clear:
        NODE_ENV: production
        SSL_ENABLED: "true"
        LANG: en_US.UTF8
        DOMAIN: *domain
        CLIENT_SERVER_PORT: "3010"
        CLIENT_URL: *client-url
        CLIENT_BROWSER_API_URL: *client-url
        CLIENT_BROWSER_API_CABLE_URL: *client-url
        CLIENT_SERVER_API_URL: "http://manifold-api:3011"
        CLIENT_SERVER_PROXIES: "true"

